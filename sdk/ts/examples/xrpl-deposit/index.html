<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XRPL Deposit Demo</title>
    <style>
      :root {
        color: #151922;
        background: #f6f8fb;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        width: min(1080px, calc(100vw - 32px));
        margin: 48px auto;
      }

      h1 {
        margin: 0 0 24px;
        font-size: 34px;
        line-height: 1.1;
      }

      form {
        display: grid;
        gap: 24px;
      }

      fieldset {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin: 0;
        padding: 24px;
        border: 1px solid #d7dee8;
        border-radius: 8px;
      }

      legend {
        padding: 0 10px;
        font-size: 22px;
        font-weight: 750;
      }

      label {
        display: grid;
        gap: 8px;
        font-weight: 700;
      }

      label.full {
        grid-column: 1 / -1;
      }

      input {
        min-width: 0;
        height: 44px;
        padding: 0 16px;
        border: 1px solid #c7d0dd;
        border-radius: 6px;
        background: #fff;
        color: #151922;
        font: inherit;
        font-weight: 650;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        min-height: 52px;
        padding: 0 24px;
        border: 0;
        border-radius: 6px;
        background: #145be8;
        color: #fff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button:disabled {
        background: #9098a3;
        cursor: not-allowed;
      }

      output {
        display: block;
        min-height: 120px;
        padding: 20px;
        border-radius: 8px;
        background: #0f1727;
        color: #eef3fb;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-weight: 700;
      }

      @media (max-width: 760px) {
        main {
          margin: 24px auto;
        }

        fieldset {
          grid-template-columns: 1fr;
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>XRPL Deposit Demo</h1>
      <form id="deposit-form">
        <fieldset>
          <legend>Network</legend>
          <label>
            WebSocket URL
            <input id="rpc-url" value="ws://127.0.0.1:6006" />
          </label>
          <label>
            Vault Address
            <input id="vault-address" value="rHb9CJAWyB4rj91VRWn96DkukG4bwdtyTh" />
          </label>
          <label>
            Max Fee Drops
            <input id="max-fee-drops" value="" placeholder="optional" />
          </label>
          <label>
            Admin HTTP URL
            <input id="admin-rpc-url" value="/xrpl-admin" />
          </label>
          <label>
            Fund Drops
            <input id="fund-drops" value="1000000000" />
          </label>
        </fieldset>

        <fieldset>
          <legend>Signer</legend>
          <label class="full">
            Local Wallet Seed
            <input id="local-seed" value="" placeholder="blank generates a local dev wallet" />
          </label>
        </fieldset>

        <fieldset>
          <legend>Deposit</legend>
          <label>
            Credited Account
            <input id="account" value="00000000000000000000000000000000000000a1" />
          </label>
          <label>
            Asset
            <input id="asset" value="" />
          </label>
          <label>
            Reference
            <input id="reference" placeholder="0x... (optional bytes32)" />
          </label>
          <label>
            Amount
            <input id="amount" value="1000000" />
          </label>
        </fieldset>

        <div class="actions">
          <button type="button" id="connect-local">Use Local Signer</button>
          <button type="button" id="connect-gemwallet">Connect GemWallet</button>
          <button type="button" id="fund">Fund Wallet</button>
          <button type="submit" id="submit">Submit Deposit</button>
          <button type="button" id="verify" disabled>Verify Last Tx</button>
        </div>
        <output id="log"></output>
      </form>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
