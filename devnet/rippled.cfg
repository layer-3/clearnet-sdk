[server]
port_rpc
port_ws
port_peer

[port_rpc]
port = 5005
ip = 0.0.0.0
admin = 0.0.0.0
protocol = http

[port_ws]
port = 6006
ip = 0.0.0.0
admin = 0.0.0.0
protocol = ws

[port_peer]
port = 51235
ip = 0.0.0.0
protocol = peer

[node_size]
tiny

# Keep this local id away from public Xahau ids. GemWallet and other wallets
# know 21337/21338 as Xahau mainnet/testnet.
[network_id]
31337

[node_db]
type=NuDB
path=/var/lib/rippled/db/nudb

[database_path]
/var/lib/rippled/db

[debug_logfile]
/var/log/rippled/debug.log

[sntp_servers]
time.windows.com
time.apple.com
time.nist.gov
pool.ntp.org

[validators_file]
validators.txt

[rpc_startup]
{ "command": "log_level", "severity": "warning" }

[ssl_verify]
0
