name: Test (TypeScript)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  unit:
    name: TypeScript Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Build demo
        run: npm --workspace @yellow-org/evm-deposit-demo run build

  evm-integration:
    name: TypeScript EVM Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Bring up Anvil
        run: make devnet-evm

      - name: EVM integration tests
        run: npm run test:integration:evm

      - name: Tear down devnet
        if: always()
        run: make devnet-down
